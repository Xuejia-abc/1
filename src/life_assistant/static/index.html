<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智能生活识别助手</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>智能生活识别助手</h1>
        <p>拍照/上传图片引用，获取识别结果、建议与可分享卡片。</p>
      </header>

      <section class="card">
        <h2>1) 新建识别</h2>
        <form id="recognition-form">
          <label>
            用户 ID
            <input id="user-id" value="demo_user" required />
          </label>
          <label>
            图片引用（文件名/URL/描述）
            <input id="image-ref" placeholder="例如: tomato.jpg" required />
          </label>
          <label>
            语音补充（可选）
            <input id="voice-note" placeholder="例如: 我家光照不足" />
          </label>
          <button type="submit">识别并生成建议</button>
        </form>
      </section>

      <section class="card" id="recognition-result" hidden>
        <h2>2) 识别结果</h2>
        <div id="result-summary"></div>
        <h3>建议</h3>
        <ul id="result-suggestions"></ul>
        <div class="actions">
          <button id="copy-suggestions">复制建议</button>
          <button id="favorite-recognition">收藏本条</button>
          <button id="build-share-card">生成分享卡片</button>
        </div>
      </section>

      <section class="grid">
        <article class="card">
          <h2>3) 历史记录</h2>
          <button id="load-history">刷新历史</button>
          <ul id="history-list"></ul>
        </article>

        <article class="card">
          <h2>4) 收藏记录</h2>
          <button id="load-favorites">刷新收藏</button>
          <ul id="favorites-list"></ul>
        </article>
      </section>

      <section class="card" id="share-card" hidden>
        <h2>分享卡片预览</h2>
        <pre id="share-content"></pre>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
